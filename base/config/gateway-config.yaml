apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  labels:
    app.kubernetes.io/name: mcpgateway
    app.kubernetes.io/part-of: mcp-gateway
data:
  # Environment — Development uses Redis + dev auth bypass; Production uses Redis + Entra ID
  ASPNETCORE_ENVIRONMENT: "Development"
  # Redis connection (shared between mcpgateway and toolgateway)
  Redis__ConnectionString: "redis-service:6379"
  # Kubernetes namespace for managed MCP server pods (upstream default: "adapter")
  AdapterNamespace: "mcp-gateway-np"
  # Container registry for dynamically deployed MCP servers
  ContainerRegistrySettings__Endpoint: "nkp-mgmt.uwcu.org:5000/mcp-servers"
  # Public origin for MCP protocol resource metadata
  PublicOrigin: "https://mcp-gateway.nkp-np.uwcu.org/"
