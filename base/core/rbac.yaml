---
# ServiceAccount for the MCP Gateway — needs RBAC to manage StatefulSets/Services/Pods
# when deploying MCP servers via the /adapters and /tools APIs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcpgateway-sa

---
# Role granting management of StatefulSets, Services, and Pods within the namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcpgateway-manager
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "create", "update", "delete", "patch", "watch"]
  - apiGroups: [""]
    resources: ["services", "pods"]
    verbs: ["get", "list", "create", "update", "delete", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcpgateway-manager-binding
subjects:
  - kind: ServiceAccount
    name: mcpgateway-sa
roleRef:
  kind: Role
  name: mcpgateway-manager
  apiGroup: rbac.authorization.k8s.io
